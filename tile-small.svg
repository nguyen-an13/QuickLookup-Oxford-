<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 440 280" width="440" height="280">
  <defs>
    <!-- Nền Gradient xanh da trời nhạt dịu mát -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF" />
      <stop offset="100%" stop-color="#E0F2FE" />
    </linearGradient>
  </defs>
  
  <rect width="440" height="280" fill="url(#bgGrad)" />

  <!-- Họa tiết ML chìm nhẹ làm nền -->
  <g opacity="0.12" stroke="#0284C7" stroke-width="1.2">
    <line x1="30" y1="50" x2="120" y2="40" />
    <line x1="120" y1="40" x2="170" y2="100" />
    <circle cx="30" cy="50" r="3" fill="#0284C7" />
    <circle cx="120" cy="40" r="3" fill="#0284C7" />
    <circle cx="170" cy="100" r="3" fill="#0284C7" />
  </g>

  <!-- =================================================================== -->
  <!-- CHÒM SAO BẮC ĐẨU & TIỂU HÙNG ĐỒNG DẠNG (Đã thu nhỏ 30% theo bản gốc)  -->
  <!-- =================================================================== -->
  <g id="star-constellations-small" opacity="0.22">
    <!-- Chòm Bắc Đẩu (Ursa Major) - Màu xanh -->
    <polyline points="296,235 323,232 347,240 374,244" fill="none" stroke="#0284C7" stroke-width="0.5" stroke-linejoin="round" />
    <polygon points="374,244 386,265 419,262 419,235" fill="none" stroke="#0284C7" stroke-width="0.5" stroke-linejoin="round" />
    
    <circle cx="296" cy="235" r="2.1" fill="#0284C7" /> 
    <circle cx="323" cy="232" r="2.1" fill="#0284C7" /> 
    <circle cx="347" cy="240" r="2.1" fill="#0284C7" /> 
    <circle cx="374" cy="244" r="2.1" fill="#0284C7" /> 
    <circle cx="386" cy="265" r="2.1" fill="#0284C7" /> 
    <circle cx="419" cy="262" r="2.1" fill="#0284C7" /> 
    <circle cx="419" cy="235" r="2.6" fill="#0284C7" opacity="0.9" /> 
    
    <!-- Đường đứt nét định hướng trỏ thẳng lên Sao Bắc Cực -->
    <line x1="419" y1="235" x2="419" y2="42" stroke="#0284C7" stroke-width="0.4" stroke-dasharray="1.5,1.5" opacity="0.6" />

    <!-- Chòm Tiểu Hùng (Ursa Minor) - Màu đỏ Crimson -->
    <polyline points="419,42 401,45 383,51 368,63 356,87 337,83 349,56 368,63"
          fill="none"
          stroke="#0284C7"
          stroke-width="0.4"
          stroke-linejoin="round" />

<circle cx="401" cy="45" r="1.8" fill="#861F41" /> 
<circle cx="383" cy="51" r="1.8" fill="#861F41" /> 
<circle cx="368" cy="63" r="1.8" fill="#861F41" /> 
<circle cx="356" cy="87" r="1.8" fill="#861F41" /> 
<circle cx="337" cy="83" r="1.8" fill="#861F41" /> 
<circle cx="349" cy="56" r="1.8" fill="#861F41" /> 

</g>

<!-- Sao Bắc Cực (Polaris) cách điệu màu đỏ nhân trắng -->
<g id="polaris-star-small" opacity="0.85">

  <polygon points="
    419,34 421,40 427,42 421,44 419,50 417,44 411,42 417,40"
    fill="#861F41"
    opacity="0.6" />

  <circle cx="419" cy="42" r="1.1" fill="#FFFFFF" />

</g>

  <!-- Ảnh logo toàn thể ở hai góc phía trên -->
  <image href="images/korea_univ_logo.png" xlink:href="images/korea_univ_logo.png" x="20" y="15" width="28" height="36" />
  <image href="images/sdml_logo.jpeg" xlink:href="images/sdml_logo.jpeg" x="384" y="15" width="28" height="28" />

  <!-- LOGO LỤC GIÁC CỦA TIỆN ÍCH -->
  <g>
    <polygon points="95,65 95,215 30,177.5 30,102.5" fill="#002147" />
    <polygon points="95,65 160,102.5 160,177.5 95,215" fill="#FFFFFF" />
    <polygon points="95,65 160,102.5 160,177.5 95,215 30,177.5 30,102.5" fill="none" stroke="#002c5e" stroke-width="4" stroke-linejoin="round" />
    <line x1="95" y1="65" x2="95" y2="215" stroke="#002c5e" stroke-width="4" />
    <circle cx="62.5" cy="140" r="22" fill="none" stroke="#00BFFF" stroke-width="5.5" />
    <path d="M 73.5 151 L 85.5 163" stroke="#00BFFF" stroke-width="5.5" stroke-linecap="round" />
    <path d="M 107.5 117.5 H 147.5 V 140 Q 147.5 152.5 127.5 162.5 Q 107.5 152.5 107.5 140 Z" fill="#002147" />
    <path d="M 115 128.75 Q 127.5 125 127.5 128.75 L 127.5 146.25 Q 127.5 142.5 115 146.25 Z" fill="#FFFFFF" />
    <path d="M 140 128.75 Q 127.5 125 127.5 128.75 L 127.5 146.25 Q 127.5 142.5 140 146.25 Z" fill="#FFFFFF" />
    <path d="M 117.5 133.75 H 125 M 117.5 138.75 H 125" stroke="#002147" stroke-width="1" />
    <path d="M 130 133.75 H 137.5 M 130 138.75 H 137.5" stroke="#002147" stroke-width="1" />
  </g>

  <!-- PHẦN CHỮ TIÊU ĐỀ CHÍNH -->
  <text x="185" y="110" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#0F172A">Quick Oxford</text>
  <text x="185" y="142" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#0284C7">Lookup</text>
  
  <!-- HÀNG CHI TIẾT DƯỚI ĐỐI XỨNG -->
  <text x="185" y="188" font-family="'Segoe UI', Roboto, sans-serif" font-style="italic" font-size="7.2" fill="#334155" letter-spacing="0.1">Stochastic Dynamics and Machine Learning (SDML) lab</text>
  <image href="images/sdml_logo.jpeg" xlink:href="images/sdml_logo.jpeg" x="398" y="173" width="22" height="22" />

  <image href="images/korea_univ_logo.png" xlink:href="images/korea_univ_logo.png" x="185" y="196" width="20" height="25" />
  <text x="210" y="214" font-family="'Segoe UI', Roboto, sans-serif" font-style="bold italic" font-weight="bold" font-size="10" fill="#861F41" letter-spacing="0.8">KOREA UNIVERSITY</text>
</svg>