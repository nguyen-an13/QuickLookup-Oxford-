    <line x1="280" y1="60" x2="420" y2="200" />
    <circle cx="80" cy="100" r="8" fill="#0284C7" />
    <circle cx="280" cy="60" r="8" fill="#0284C7" />
    <circle cx="420" cy="200" r="8" fill="#0284C7" />
  </g>

  <g id="star-constellations" opacity="0.22">
    
    <polyline points="910,420 1000,410 1080,435 1170,450" fill="none" stroke="#0284C7" stroke-width="1.5" stroke-linejoin="round" />
    <polygon points="1170,450 1210,520 1320,510 1320,420" fill="none" stroke="#0284C7" stroke-width="1.5" stroke-linejoin="round" />
    
    <circle cx="910" cy="420" r="7" fill="#0284C7" /> 
    <circle cx="1000" cy="410" r="7" fill="#0284C7" /> 
    <circle cx="1080" cy="435" r="7" fill="#0284C7" /> 
    <circle cx="1170" cy="450" r="7" fill="#0284C7" /> 
    <circle cx="1210" cy="520" r="7" fill="#0284C7" /> 
    <circle cx="1320" cy="510" r="7" fill="#0284C7" /> 
    <circle cx="1320" cy="420" r="8.5" fill="#0284C7" opacity="0.9" /> 
    <line x1="1320" y1="420" x2="1320" y2="120" stroke="#0284C7" stroke-width="1.2" stroke-dasharray="5,5" opacity="0.6" />

    <polyline points="1320,150 1260,160 1200,180 1150,220 1110,300 1045,285 1085,195 1150,220" fill="none" stroke="#0284C7" stroke-width="1.2" stroke-linejoin="round" />
    
    <circle cx="1260" cy="160" r="6" fill="#861F41" /> 
    <circle cx="1200" cy="180" r="6" fill="#861F41" /> 
    <circle cx="1150" cy="220" r="6" fill="#861F41" /> 
    <circle cx="1110" cy="300" r="6" fill="#861F41" /> 
    <circle cx="1045" cy="285" r="6" fill="#861F41" /> 
    <circle cx="1085" cy="195" r="6" fill="#861F41" /> 
    <!-- <text x="1305" y="105" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#0284C7" opacity="0.8">Polaris (North Star)</text> -->
    <!-- <text x="1040" y="165" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" fill="#0284C7" opacity="0.6">Ursa Minor</text> -->
    <!-- <text x="1050" y="540" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" fill="#0284C7" opacity="0.6">Ursa Major (Big Dipper)</text> -->
  </g>

  <g id="polaris-star" opacity="0.85">
    <polygon points="1320,130 1325,145 1340,150 1325,155 1320,170 1315,155 1300,150 1315,145" fill="#861F41" opacity="0.6" />
    <circle cx="1320" cy="150" r="3.5" fill="#FFFFFF" />
  </g>


