<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" width="1400" height="560">
  <defs>
    <!-- Nền Gradient xanh da trời nhạt rộng -->
    <linearGradient id="bgGradLarge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF" />
      <stop offset="100%" stop-color="#E0F2FE" />
    </linearGradient>
  </defs>
  
  <rect width="1400" height="560" fill="url(#bgGradLarge)" />

  <!-- Họa tiết ML blueprint lớn phía nền -->
  <g opacity="0.12" stroke="#0284C7" stroke-width="2.5">
